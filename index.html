<!DOCTYPE html>
<html>
<head>
  <title>Cloud Storage App</title>
</head>
<body>
  <h2>Upload File</h2>
 <input type="file" id="fileInput" />
<br><br>&nbsp;&nbsp;&nbsp;  <button onclick="uploadFile()">Upload</button><br><br>
<label id=status>upload status</label><br><br>
  <h2>Files in S3</h2>
  <button onclick="loadFiles()">Show Files</button>
  <ul id="fileList"></ul>

  <script>
    alert("Java script loaded");
    const API_URL = "https://8bj71kza2b.execute-api.us-east-1.amazonaws.com/";

    async function uploadFile() {
      alert("upload button click");
     const status = document.getElementById("status");
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];

      if (!file) {
        alert("File is not selected");
        return;
      }

      

      try {
        const res = await fetch(
          "https://8bj71kza2b.execute-api.us-east-1.amazonaws.com/?filename=" +
          encodeURIComponent(file.name)
        );

        const data = await res.json();

        

        const uploadRes = await fetch(data.uploadUrl, {
          method: "PUT",
          body: file
        });

        if (uploadRes.status === 200) {
          alert("File Uploaded Successfully");
        } else {
          alert("Upload Failed");
        }

      } catch (err) {
        status.textContent = "❌ Error: " + err.message + err.status;
        status.className = "status error";
      }
    }

    async function loadFiles() {
      const res = await fetch(API_URL + "/list");
      const data = await res.json();

      const list = document.getElementById("fileList");
      list.innerHTML = "";

      data.files.forEach(file => {
        const li = document.createElement("li");
        li.textContent = file;

        const downloadBtn = document.createElement("button");
        downloadBtn.textContent = "Download";
        downloadBtn.onclick = () => downloadFile(file);

        li.appendChild(downloadBtn);
        list.appendChild(li);
      });
    }

    async function downloadFile(fileName) {
      const res = await fetch(API_URL + "/upload?key=" + fileName);
      const data = await res.json();

      window.location.href = data.url;
    }
  </script>
</body>
</html>
