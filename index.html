<!DOCTYPE html>
<html>
<head>
  <title>Cloud Storage App</title>
</head>
<body>
  <h2>Upload File</h2>
 <input type="file" id="fileInput" />
<br><br>&nbsp;&nbsp;&nbsp;  <button onclick="uploadFile()">Upload</button><br><br>

  <h2>Files in S3</h2>
  <button onclick="loadFiles()">Show Files</button>
  <ul id="fileList"></ul>

  <script>
    alert("Java script loaded");
    const API_URL = "https://8bj71kza2b.execute-api.us-east-1.amazonaws.com/";

    async function uploadFile() {
      alert("upload button click");
      const file = document.getElementById("fileInput").files[0];
      if (!file) {
  alert("Please select a file");
  return;
}
      const fileName = file.name;
alert("upload function. "+fileName+ "url="+ API_URL + "/upload?key=" + fileName);
      const res = await fetch(API_URL + "/upload?key=" + fileName);
      if(!res.ok)
      {
        const errmsg = await res.text();
        alert("**error**="+errmsg);
      }
      alert(fileName);
      const data = await res.json();

      const uploadres=await fetch(data.url, {
        method: "PUT",
        headers: {
    "Content-Type": file.type || "application/octet-stream"
  },
        body: file
      });
      if(!uploadres.ok)
      {
        alert("upload failed");
      }
      alert("Uploaded successfully!");
   //   loadFiles();
    }

    async function loadFiles() {
      const res = await fetch(API_URL + "/list");
      const data = await res.json();

      const list = document.getElementById("fileList");
      list.innerHTML = "";

      data.files.forEach(file => {
        const li = document.createElement("li");
        li.textContent = file;

        const downloadBtn = document.createElement("button");
        downloadBtn.textContent = "Download";
        downloadBtn.onclick = () => downloadFile(file);

        li.appendChild(downloadBtn);
        list.appendChild(li);
      });
    }

    async function downloadFile(fileName) {
      const res = await fetch(API_URL + "/upload?key=" + fileName);
      const data = await res.json();

      window.location.href = data.url;
    }
  </script>
</body>
</html>
